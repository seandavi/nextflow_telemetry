# Production compose for nextflow_telemetry on onclappc02 (cancerdatasci.org).
#
# Companion services (Traefik, the pg_main Postgres cluster) live in
# monode/infrastructure/compose and are deployed independently. This file
# only adds the telemetry API and the static-frontend container, both of
# which join the existing `proxy` network so Traefik routes them
# transparently.
#
# DB connectivity: the pg_main container (monode pg_main_stack) publishes
# Postgres only on 127.0.0.1:5432, so it is NOT reachable via the docker
# host-gateway. The API instead joins pg_main_stack_default (the cluster's
# docker network) and connects to the container directly as host `pg_main`.
#
# See ./README.md for first-time setup and the Cloud Run → onclappc02
# cutover plan.

services:
  nf_telemetry_api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: nf-telemetry-api:local
    container_name: nf_telemetry_api
    restart: unless-stopped
    networks:
      - proxy
      - pg_main_stack_default
    # Two env_files: .env is hand-edited (hosts, DB URI), .env.secrets is
    # generated by ./fetch-secrets.sh from GCP Secret Manager. Compose
    # merges them and lets `environment:` overlay reference both.
    env_file:
      - .env
      - .env.secrets
    environment:
      SQLALCHEMY_URI: ${SQLALCHEMY_URI}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${FRONTEND_HOST:-cmgd.cancerdatasci.org}}
      # OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET / SESSION_SECRET come from
      # .env.secrets via env_file. Do NOT list them in `environment:` —
      # compose interpolates `${VAR}` from the shell + the auto-loaded
      # .env (NOT from env_file), so listing them with `${VAR}` would
      # overwrite the env_file values with empty strings.
      OAUTH_REDIRECT_URI: https://${API_HOST:-nf-telemetry.cancerdatasci.org}/auth/callback
      # Frontend and API live on different subdomains of the same parent;
      # scoping the cookie to the parent lets the SPA send it to the API
      # on cross-origin fetches (still SameSite=Lax — same eTLD+1).
      SESSION_COOKIE_DOMAIN: .cancerdatasci.org
      # Where to send the user after a successful OAuth callback.
      FRONTEND_URL: https://${FRONTEND_HOST:-cmgd.cancerdatasci.org}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nf-telemetry-api.rule=Host(`${API_HOST:-nf-telemetry.cancerdatasci.org}`)"
      - "traefik.http.routers.nf-telemetry-api.entrypoints=websecure"
      - "traefik.http.routers.nf-telemetry-api.tls=true"
      - "traefik.http.routers.nf-telemetry-api.tls.certresolver=cloudflare"
      - "traefik.http.services.nf-telemetry-api.loadbalancer.server.port=8000"

  nf_telemetry_frontend:
    build:
      context: ../..
      dockerfile: deploy/onclappc02/Dockerfile.frontend
      args:
        # Baked into the bundle at build time. Must match the API host
        # the frontend will talk to (CORS is enforced server-side, too).
        VITE_API_URL: https://${API_HOST:-nf-telemetry.cancerdatasci.org}
    image: nf-telemetry-frontend:local
    container_name: nf_telemetry_frontend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nf-telemetry-frontend.rule=Host(`${FRONTEND_HOST:-cmgd.cancerdatasci.org}`)"
      - "traefik.http.routers.nf-telemetry-frontend.entrypoints=websecure"
      - "traefik.http.routers.nf-telemetry-frontend.tls=true"
      # NO certresolver: this hostname is proxied at Cloudflare (orange
      # cloud), so the LE TLS-ALPN-01 challenge cannot reach origin
      # (CF terminates TLS at the edge). Traefik falls back to the
      # default cert configured in
      # monode/infrastructure/compose/traefik/config/tls.yml — the
      # Cloudflare Origin Certificate (*.cancerdatasci.org, 15yr,
      # trusted only by CF). CF→origin runs in "Full (strict)" mode.
      - "traefik.http.services.nf-telemetry-frontend.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
  # The monode pg_main_stack cluster's default network. External so this
  # app can reach Postgres at host `pg_main` without it being published on
  # the LAN (pg_main binds 127.0.0.1 only on the host).
  pg_main_stack_default:
    external: true
