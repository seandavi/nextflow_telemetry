[project]
name = "nf-client"
version = "0.1.0"
description = "Client library for fetching and reporting Nextflow telemetry jobs"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Sean Davis", email = "seandavi@gmail.com" }]
license = { text = "MIT" }
dependencies = [
    "httpx>=0.27.0,<0.28.0",
    "pydantic>=2.0.0,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "jinja2>=3.1.0,<4.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "typer>=0.12.0,<0.13.0",
    "uuid7>=0.1.0",   # installs as uuid_extensions; provides uuid7() on Python < 3.13
]

[dependency-groups]
dev = [
    "pytest>=8.3.0,<9.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",
    "respx>=0.21.0,<0.22.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
nf-client = "nf_client.cli:app"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
